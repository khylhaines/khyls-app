<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#000000" />
  <title>Barrow Quest</title>

  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body>

  <!-- TOP BAR -->
  <div class="top-appbar">
    <div class="top-left">
      <button id="btn-home" class="icon-btn">🏠</button>
    </div>
    <div class="top-center">
      <div class="top-pill">BARROW QUEST</div>
    </div>
    <div class="top-right">
      <div class="status-stack">
        <div class="status-chip">XP<strong id="top-xp">0</strong></div>
        <div class="status-chip">COINS<strong id="top-coins">0</strong></div>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <button id="action-trigger">⚡</button>

  <!-- START MODAL -->
  <div id="start-modal" class="full-modal" style="display:block">
    <div class="modal-header">
      <h2>BARROW QUEST</h2>
    </div>

    <div class="start-grid">
      <button class="win-btn" id="btn-start">START ADVENTURE</button>
    </div>
  </div>

  <!-- TERRITORY PANEL -->
  <div id="territory-command-modal" class="full-modal territory-modal">
    <div class="modal-header">
      <h2>⚔️ TERRITORY CONTROL</h2>
    </div>

    <div class="territory-panel-card">

      <div id="territory-node-name">NODE</div>

      <div class="territory-stat-grid">
        <div>Owner: <strong id="territory-node-owner"></strong></div>
        <div>Level: <strong id="territory-node-level"></strong></div>
        <div>Defence: <strong id="territory-node-defence"></strong></div>
        <div>Stored: <strong id="territory-node-stored"></strong></div>
      </div>

      <div class="territory-defence-bar">
        <div id="territory-defence-fill"></div>
      </div>

      <div id="territory-panel-message"></div>

      <button id="btn-territory-bot-toggle" class="win-btn">🤖 BOT</button>
      <button id="btn-territory-bot-difficulty" class="win-btn">🎚️ DIFFICULTY</button>

      <div class="territory-action-grid">
        <button id="btn-territory-capture">CAPTURE</button>
        <button id="btn-territory-attack">ATTACK</button>
        <button id="btn-territory-upgrade">UPGRADE</button>
        <button id="btn-territory-repair">COLLECT</button>
      </div>

    </div>

    <button id="btn-territory-close">CLOSE</button>
  </div>

  <!-- TASK MODAL (FIXED SECTION) -->
  <div id="task-modal" class="full-modal">

    <div id="boss-progress"
      style="
        margin-top: 12px;
        padding: 12px;
        border-radius: 14px;
        border: 1px solid rgba(255, 213, 74, 0.25);
        background: rgba(255, 213, 74, 0.08);
        color: #ffe8a3;
        font-size: 12px;
        line-height: 1.5;
        white-space: pre-wrap;
        display: none;
      ">
    </div>

    <button id="btn-task-close">CLOSE</button>
  </div>

  <!-- WELCOME -->
  <div id="welcome-overlay" class="welcome-overlay hidden">
    <div class="welcome-box">
      <h2>🧭 Barrow Quest</h2>
      <p id="welcome-text">Welcome, explorer.</p>
    </div>
  </div>

  <!-- REQUIRED SCRIPTS -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script type="module" src="./app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker
          .register("./service-worker.js")
          .catch((err) => console.error(err));
      });
    }
  </script>

</body>
</html>
